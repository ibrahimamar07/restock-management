version: "3.8"

services:
    app:
        build: .
        container_name: restock-app
        restart: unless-stopped
        working_dir: /var/www

        ports:
            - "8080:80"

        volumes:
            - .:/var/www

        depends_on:
            - mysql

    mysql:
        image: mysql:8.0
        container_name: restock-mysql
        restart: unless-stopped

        environment:
            MYSQL_DATABASE: restockmanagementdb
            MYSQL_ALLOW_EMPTY_PASSWORD: "yes"

        ports:
            - "3306:3306"

        volumes:
            - mysql_data:/var/lib/mysql

volumes:
    mysql_data:
